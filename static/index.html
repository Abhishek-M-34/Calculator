<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Calculator</title>
  <style>
    :root {
      --bg: #0b0b18;
      --panel: #12122b;
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent2: #06b6d4;
      --button: #1e1e3f;
      --button-hover: #2d2d5a;
      --button-op: #2e1e60;
      --button-op-hover: #3d2b7a;
      --button-eq: #7c3aed;
      --button-eq-hover: #6d28d9;
      --button-del: #451a1a;
      --button-del-hover: #5d2424;
      --button-ac: #334155;
      --button-ac-hover: #475569;
      --button-sci: #162e45;
      --button-sci-hover: #1e3a5a;
      --green: #4ade80;
      --red: #f87171;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top right, #1e1e4a 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 480px;
      transition: var(--transition);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 1.25rem;
      margin: 0;
      background: linear-gradient(to right, #fff, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    header .clock {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 10px 0;
      border-radius: 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    .display {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-height: 140px;
      justify-content: center;
    }

    .expr {
      color: var(--muted);
      font-size: 1rem;
      min-height: 1.5rem;
      word-break: break-all;
      text-align: right;
      margin-bottom: 8px;
    }

    .result {
      font-size: 3rem;
      font-weight: 700;
      text-align: right;
      word-break: break-all;
      line-height: 1;
      width: 100%;
      transition: var(--transition);
    }

    .history {
      margin-top: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    #historyLabel {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #historyBtn {
      background: transparent;
      border: none;
      color: var(--accent2);
      font-size: 0.85rem;
      cursor: pointer;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: var(--transition);
    }

    #historyBtn:hover {
      opacity: 0.8;
    }

    .pad {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .pad.visible {
      display: grid;
    }

    .pad button {
      aspect-ratio: 1;
      border: none;
      border-radius: 50%;
      font-size: 1.4rem;
      font-weight: 500;
      background: var(--button);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
    }

    .pad button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    @media (hover: hover) {
      .pad button:hover {
        background: var(--button-hover);
        filter: brightness(1.1);
      }
    }

    .pad button.op {
      background: var(--button-op);
      color: var(--accent2);
      font-weight: 600;
      font-size: 1.6rem;
    }

    .pad button.eq {
      background: var(--button-eq);
      color: #fff;
      font-size: 1.8rem;
    }

    .pad button.del {
      background: var(--button-del);
      color: #fb7185;
    }

    .pad button.ac {
      background: var(--button-ac);
      color: #94a3b8;
    }

    #padScientific {
      display: none;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    #padScientific.visible {
      display: flex;
    }

    .sci-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
    }

    .sci-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .unit-toggle {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      overflow: hidden;
    }

    .unit-btn {
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: var(--transition);
    }

    .unit-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Keep scientific keypad buttons consistent with standard mode */
    .sci-group.keypad button {
      aspect-ratio: 1;
      border-radius: 50%;
      font-size: 1.4rem;
    }

    /* Scientific functions use rounded rectangles to fit text better */
    .sci-group.functions button {
      border-radius: 12px;
      height: 48px;
      font-size: 0.95rem;
      background: var(--button-sci);
      color: #38bdf8;
    }

    .sci-group.functions button.ac { background: var(--button-ac); color: #94a3b8; }
    .sci-group.functions button.del { background: var(--button-del); color: #fb7185; }

    /* Desktop overrides for Scientific - Side by Side */
    @media (min-width: 1024px) {
      .app { max-width: 850px; }
      
      #padScientific.visible {
        flex-direction: row;
        max-width: 100%;
        align-items: flex-start;
        justify-content: center;
        gap: 32px;
      }
      
      .sci-group {
        max-width: 380px;
      }
      
      .result { font-size: 4rem; }
    }

    .ai-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .ai-panel.visible {
      display: flex;
    }

    .ai-header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .ai-modes {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ai-mode {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .ai-mode.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .ai-status-text {
      color: var(--muted);
      flex: 1;
    }

    .ai-remaining {
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .ai-remaining.green { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .ai-remaining.yellow { background: rgba(250, 204, 21, 0.15); color: #fbbf24; }
    .ai-remaining.red { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .ai-remaining.grey { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

    .ai-key {
      display: flex;
      gap: 8px;
    }

    .ai-key input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.9rem;
    }

    .ai-key button {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .ai-chat {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      height: 250px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }

    .ai-msg .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 85%;
    }

    .ai-msg.user { align-self: flex-end; }
    .ai-msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ai-msg.bot { align-self: flex-start; }
    .ai-msg.bot .bubble {
      background: var(--button-hover);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .ai-input-row {
      display: flex;
      gap: 8px;
    }

    .ai-input-row textarea {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      color: #fff;
      resize: none;
      font-family: inherit;
    }

    .ai-input-row button {
      background: var(--accent);
      border: none;
      border-radius: 16px;
      padding: 0 20px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Tablet Responsiveness */
    @media (min-width: 640px) {
      .app { max-width: 520px; }
      #padScientific {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Desktop Responsiveness */
    @media (min-width: 1024px) {
      .app { max-width: 800px; }
      
      /* In desktop mode, if scientific is active, we could potentially 
         show both pads or a wider grid. For now, let's just make it look more spacious. */
      .panel { padding: 32px; }
      
      #padScientific {
        grid-template-columns: repeat(6, 1fr); /* 6 columns on desktop for scientific */
      }
      
      .result { font-size: 4rem; }
    }

    /* Small Mobile Adjustment */
    @media (max-width: 380px) {
      .panel { padding: 16px; }
      .pad { gap: 8px; }
      .pad button { font-size: 1.25rem; }
      .result { font-size: 2.25rem; }
      .expr { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>✦ Smart Calculator</h1>
      <div class="clock" id="clock">--:--</div>
    </header>

    <div class="tabs">
      <button class="tab active" data-mode="standard">⌨ Standard</button>
      <button class="tab" data-mode="scientific">∫ Scientific</button>
      <button class="tab" data-mode="ai">🤖 AI</button>
    </div>

    <div class="panel">
      <div class="display">
        <div class="expr" id="exprDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
        <div class="history">
          <span id="historyLabel">LAST:</span>
          <button id="historyBtn" type="button">—</button>
        </div>
      </div>

      <div class="pad" id="padStandard">
        <button class="ac" data-action="ac">AC</button>
        <button class="del" data-action="del">DEL</button>
        <button class="op" data-value="(">(</button>
        <button class="op" data-value=")">)</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="÷">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="×">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="-">−</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="eq" data-action="eval">=</button>
        <button class="op" data-value="+">+</button>
      </div>

      <div class="pad hidden" id="padScientific">
        <div class="sci-toolbar">
          <div class="unit-toggle">
            <button class="unit-btn active" id="unitDeg">DEG</button>
            <button class="unit-btn" id="unitRad">RAD</button>
          </div>
        </div>
        <div class="sci-group functions">
          <button class="sci" data-value="sin(">sin</button>
          <button class="sci" data-value="cos(">cos</button>
          <button class="sci" data-value="tan(">tan</button>
          <button class="ac" data-action="ac">AC</button>

          <button class="sci" data-value="log(">log</button>
          <button class="sci" data-value="ln(">ln</button>
          <button class="sci" data-value="sqrt(">√</button>
          <button class="sci" data-value="^2">x²</button>

          <button class="sci" data-value="^">xʸ</button>
          <button class="sci" data-value="π">π</button>
          <button class="sci" data-value="e">e</button>
          <button class="op" data-value="%">%</button>

          <button class="paren" data-value="(">(</button>
          <button class="paren" data-value=")">)</button>
          <button class="del" data-action="del">⌫</button>
          <button class="op" data-value="÷">÷</button>
        </div>

        <div class="sci-group keypad">
          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button class="op" data-value="×">×</button>

          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button class="op" data-value="−">−</button>

          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button class="op" data-value="+">+</button>

          <button data-value="00">00</button>
          <button data-value="0">0</button>
          <button data-value=".">.</button>
          <button class="eq" data-action="eval">=</button>
        </div>
      </div>

      <div class="ai-panel hidden" id="aiPanel">
        <div class="ai-header">
          <div class="ai-modes">
            <button type="button" id="modeBackend" class="ai-mode active">Backend</button>
            <button type="button" id="modeKey" class="ai-mode">Own API</button>
          </div>

          <div class="ai-status" id="aiStatus">
            <span class="ai-status-dot" id="aiStatusDot">●</span>
            <span id="aiStatusText">Not connected — get a FREE key at console.groq.com</span>
            <span id="aiRemaining" class="ai-remaining"></span>
          </div>
        </div>

        <div class="ai-key" id="aiKeyRow">
          <input id="apiKey" type="password" placeholder="Paste your Groq API key" autocomplete="off" />
          <button id="connectBtn" type="button">Connect</button>
        </div>

        <div class="ai-chat" id="aiChat"></div>

        <div class="ai-input-row">
          <textarea id="question" placeholder="Ask something..." rows="2"></textarea>
          <button id="aiBtn">Ask AI</button>
        </div>
      </div>

      <div class="footer">
        Tip: Run backend with <code>uvicorn server:app --reload</code> and open <code>http://localhost:8000/</code>.
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
