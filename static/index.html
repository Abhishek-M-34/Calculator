<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #03030b;
      --panel: rgba(13, 13, 33, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.5);
      --accent2: #22d3ee;
      --button: rgba(30, 30, 63, 0.4);
      --button-hover: rgba(45, 45, 90, 0.6);
      --button-op: rgba(46, 30, 96, 0.4);
      --button-op-hover: rgba(61, 43, 122, 0.6);
      --button-eq: #8b5cf6;
      --button-eq-hover: #7c3aed;
      --button-del: rgba(69, 26, 26, 0.4);
      --button-del-hover: rgba(93, 36, 36, 0.6);
      --button-ac: rgba(51, 65, 85, 0.4);
      --button-ac-hover: rgba(71, 85, 105, 0.6);
      --button-sci: rgba(22, 46, 69, 0.4);
      --button-sci-hover: rgba(30, 58, 90, 0.6);
      --green: #4ade80;
      --red: #f87171;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Mesh Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      z-index: -1;
      animation: meshFlow 20s ease infinite alternate;
    }

    @keyframes meshFlow {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(20px, 20px); }
    }

    .app {
      width: 100%;
      max-width: 480px;
      transition: var(--transition);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    header h1 {
      font-size: 1.3rem;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header .clock {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 10px 0;
      border-radius: 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 36px;
      padding: 32px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      animation: panelFloat 4s ease-in-out infinite alternate;
    }

    @keyframes panelFloat {
      0% { transform: translateY(0); box-shadow: var(--shadow); }
      100% { transform: translateY(-5px); box-shadow: 0 35px 60px -15px rgba(139, 92, 246, 0.15); }
    }

    .panel::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .display {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-height: 160px;
      justify-content: center;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }

    .expr {
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 400;
      min-height: 1.5rem;
      word-break: break-all;
      text-align: right;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .result {
      font-size: 3.5rem;
      font-weight: 700;
      text-align: right;
      word-break: break-all;
      line-height: 1.1;
      width: 100%;
      transition: var(--transition);
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(to bottom, #fff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .history {
      margin-top: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    #historyLabel {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #historyBtn {
      background: transparent;
      border: none;
      color: var(--accent2);
      font-size: 0.85rem;
      cursor: pointer;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: var(--transition);
    }

    #historyBtn:hover {
      opacity: 0.8;
    }

    .pad {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .pad.visible {
      display: grid;
    }

    .pad button {
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      background: var(--button);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .pad button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: var(--transition);
    }

    .pad button:hover::before {
      opacity: 1;
    }

    .pad button span {
      font-size: 1.5rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .pad button small {
      font-size: 0.6rem;
      opacity: 0.5;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
      letter-spacing: 0.8px;
      position: relative;
      z-index: 1;
    }

    .pad button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.1);
    }

    .pad button.op {
      background: var(--button-op);
      color: var(--accent2);
      border-color: rgba(6, 182, 212, 0.1);
    }

    .pad button.eq {
      background: linear-gradient(135deg, var(--accent) 0%, #6d28d9 100%);
      color: #fff;
      box-shadow: 0 10px 20px -5px var(--accent-glow);
    }

    .pad button.eq span { font-size: 2rem; }

    .pad button.del {
      background: var(--button-del);
      color: #fb7185;
    }

    .pad button.ac {
      background: var(--button-ac);
      color: #94a3b8;
    }

    #padScientific {
      display: none;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    #padScientific.visible {
      display: flex;
    }

    .sci-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
    }

    .sci-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .unit-toggle {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      overflow: hidden;
    }

    .unit-btn {
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: var(--transition);
    }

    .unit-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Keep scientific keypad buttons consistent with standard mode */
    .sci-group.keypad button {
      aspect-ratio: 1;
      border-radius: 50%;
      font-size: 1.4rem;
    }

    /* Scientific functions use rounded rectangles to fit text better */
    .sci-group.functions button {
      border-radius: 18px;
      height: 58px;
      background: var(--button-sci);
      color: var(--accent2);
      border-color: rgba(6, 182, 212, 0.15);
    }

    .sci-group.functions button span {
      font-size: 1rem;
      font-weight: 700;
    }

    .sci-group.functions button small {
      color: var(--accent2);
      opacity: 0.6;
    }

    .sci-group.functions button.ac { background: var(--button-ac); color: #94a3b8; }
    .sci-group.functions button.del { background: var(--button-del); color: #fb7185; }

    /* Desktop overrides for Scientific - Side by Side */
    @media (min-width: 1024px) {
      .app { max-width: 850px; }
      
      #padScientific.visible {
        flex-direction: row;
        max-width: 100%;
        align-items: flex-start;
        justify-content: center;
        gap: 32px;
      }
      
      .sci-group {
        max-width: 380px;
      }
      
      .result { font-size: 4rem; }
    }

    .ai-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .ai-panel.visible {
      display: flex;
    }

    .ai-header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .ai-modes {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ai-mode {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .ai-mode.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .ai-status-text {
      color: var(--muted);
      flex: 1;
    }

    .ai-remaining {
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .ai-remaining.green { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .ai-remaining.yellow { background: rgba(250, 204, 21, 0.15); color: #fbbf24; }
    .ai-remaining.red { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .ai-remaining.grey { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

    .ai-key {
      display: flex;
      gap: 8px;
    }

    .ai-key input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.9rem;
    }

    .ai-key button {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .ai-chat {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      height: 250px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }

    .ai-msg .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 85%;
    }

    .ai-msg.user { align-self: flex-end; }
    .ai-msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ai-msg.bot { align-self: flex-start; }
    .ai-msg.bot .bubble {
      background: var(--button-hover);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .ai-input-row {
      display: flex;
      gap: 8px;
    }

    .ai-input-row textarea {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      color: #fff;
      resize: none;
      font-family: inherit;
    }

    .ai-input-row button {
      background: var(--accent);
      border: none;
      border-radius: 16px;
      padding: 0 20px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .hint-bar {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.8rem;
      transition: var(--transition);
    }

    .hint-bar span {
       color: var(--accent2);
       font-weight: 700;
       font-size: 0.7rem;
       text-transform: uppercase;
       letter-spacing: 0.5px;
       border: 1px solid var(--accent2);
       padding: 1px 5px;
       border-radius: 4px;
       flex-shrink: 0;
    }

    .hint-text {
      line-height: 1.3;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Tablet Responsiveness */
    @media (min-width: 640px) {
      .app { max-width: 520px; }
      #padScientific {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Desktop Responsiveness */
    @media (min-width: 1024px) {
      .app { max-width: 800px; }
      
      /* In desktop mode, if scientific is active, we could potentially 
         show both pads or a wider grid. For now, let's just make it look more spacious. */
      .panel { padding: 32px; }
      
      #padScientific {
        grid-template-columns: repeat(6, 1fr); /* 6 columns on desktop for scientific */
      }
      
      .result { font-size: 4rem; }
    }

    /* Small Mobile Adjustment */
    @media (max-width: 380px) {
      .panel { padding: 16px; }
      .pad { gap: 8px; }
      .pad button { font-size: 1.25rem; }
      .result { font-size: 2.25rem; }
      .expr { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>✦ Smart Calculator</h1>
      <div class="clock" id="clock">--:--</div>
    </header>

    <div class="tabs">
      <button class="tab active" data-mode="standard">⌨ Standard</button>
      <button class="tab" data-mode="scientific">∫ Scientific</button>
      <button class="tab" data-mode="ai">🤖 AI</button>
    </div>

    <div class="panel">
      <div class="display">
        <div class="expr" id="exprDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
        <div class="history">
          <span id="historyLabel">LAST:</span>
          <button id="historyBtn" type="button">—</button>
        </div>
      </div>

      <div class="pad" id="padStandard">
        <button class="ac" data-action="ac" data-hint="Clear everything"><span>AC</span><small>CLEAR</small></button>
        <button class="del" data-action="del" data-hint="Delete last character"><span>DEL</span><small>BACK</small></button>
        <button class="op" data-value="(" data-hint="Start a grouped calculation"><span>(</span><small>OPEN</small></button>
        <button class="op" data-value=")" data-hint="End a grouped calculation"><span>)</span><small>CLOSE</small></button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="÷" data-hint="Divide by item below"><span>÷</span><small>DIV</small></button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="×" data-hint="Multiply numbers"><span>×</span><small>MULT</small></button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="−" data-hint="Subtract numbers"><span>−</span><small>MINUS</small></button>

        <button data-value="0">0</button>
        <button data-value="." data-hint="Decimal point">.</button>
        <button class="eq" data-action="eval" data-hint="Calculate final result"><span>=</span><small>EXE</small></button>
        <button class="op" data-value="+" data-hint="Add numbers"><span>+</span><small>PLUS</small></button>
      </div>

      <div class="pad hidden" id="padScientific">
        <div class="sci-toolbar">
          <div class="unit-toggle">
            <button class="unit-btn active" id="unitDeg" data-hint="Angle mode: Degrees (standard)">DEG</button>
            <button class="unit-btn" id="unitRad" data-hint="Angle mode: Radians (math/science)">RAD</button>
          </div>
        </div>
        <div class="sci-group functions">
          <button class="sci" data-value="sin(" data-hint="Trigonometry: Sine function"><span>sin</span><small>SINE</small></button>
          <button class="sci" data-value="cos(" data-hint="Trigonometry: Cosine function"><span>cos</span><small>COSI</small></button>
          <button class="sci" data-value="tan(" data-hint="Trigonometry: Tangent function"><span>tan</span><small>TANG</small></button>
          <button class="ac" data-action="ac" data-hint="Clear everything"><span>AC</span><small>CLR</small></button>

          <button class="sci" data-value="log(" data-hint="Logarithm (Base 10)"><span>log</span><small>L10</small></button>
          <button class="sci" data-value="ln(" data-hint="Natural Logarithm (Base e)"><span>ln</span><small>LOG E</small></button>
          <button class="sci" data-value="sqrt(" data-hint="Calculate Square Root"><span>√</span><small>ROOT</small></button>
          <button class="sci" data-value="^2" data-hint="Square: Multiply by itself"><span>x²</span><small>SQR</small></button>

          <button class="sci" data-value="^" data-hint="Power: x raised to y"><span>xʸ</span><small>EXP</small></button>
          <button class="sci" data-value="π" data-hint="Pi: constant 3.14159..."><span>π</span><small>PI</small></button>
          <button class="sci" data-value="e" data-hint="Euler: constant 2.71828..."><span>e</span><small>EXPON</small></button>
          <button class="op" data-value="%" data-hint="Percentage calculation"><span>%</span><small>PCT</small></button>

          <button class="paren" data-value="("><span>(</span><small>OP</small></button>
          <button class="paren" data-value=")"><span>)</span><small>CL</small></button>
          <button class="del" data-action="del" data-hint="Delete last character"><span>⌫</span><small>DEL</small></button>
          <button class="op" data-value="÷"><span>÷</span><small>DIV</small></button>
        </div>

        <div class="sci-group keypad">
          <button data-value="7">7</button>
          <button data-value="8">8</button>
          <button data-value="9">9</button>
          <button class="op" data-value="×"><span>×</span><small>MULT</small></button>

          <button data-value="4">4</button>
          <button data-value="5">5</button>
          <button data-value="6">6</button>
          <button class="op" data-value="−"><span>−</span><small>SUB</small></button>

          <button data-value="1">1</button>
          <button data-value="2">2</button>
          <button data-value="3">3</button>
          <button class="op" data-value="+"><span>+</span><small>ADD</small></button>

          <button data-value="00">00</button>
          <button data-value="0">0</button>
          <button data-value=".">.</button>
          <button class="eq" data-action="eval"><span>=</span><small>EXE</small></button>
        </div>
      </div>

      <div class="ai-panel hidden" id="aiPanel">
        <div class="ai-header">
          <div class="ai-modes">
            <button type="button" id="modeBackend" class="ai-mode active">Backend</button>
            <button type="button" id="modeKey" class="ai-mode">Own API</button>
          </div>

          <div class="ai-status" id="aiStatus">
            <span class="ai-status-dot" id="aiStatusDot">●</span>
            <span id="aiStatusText">Not connected — get a FREE key at console.groq.com</span>
            <span id="aiRemaining" class="ai-remaining"></span>
          </div>
        </div>

        <div class="ai-key" id="aiKeyRow">
          <input id="apiKey" type="password" placeholder="Paste your Groq API key" autocomplete="off" />
          <button id="connectBtn" type="button">Connect</button>
        </div>

        <div class="ai-chat" id="aiChat"></div>

        <div class="ai-input-row">
          <textarea id="question" placeholder="Ask something..." rows="2"></textarea>
          <button id="aiBtn">Ask AI</button>
        </div>
      </div>

      <div class="hint-bar" id="hintBar">
         <span>HINT</span>
         <div class="hint-text" id="hintText">Hover or click a key to see what it does.</div>
      </div>

      <div class="footer">
        Tip: Run backend with <code>uvicorn server:app --reload</code> and open <code>http://localhost:8000/</code>.
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
